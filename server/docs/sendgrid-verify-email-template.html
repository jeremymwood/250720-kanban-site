<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ishi Kanban - Verify your email</title>
  </head>
  <body style="margin: 0; padding: 0; background: #000; color: #00ff00">
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #000; padding: 28px 0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 560px;
              background: #000;
              border: 2px solid #004200;
              border-radius: 16px;
              overflow: hidden;
            "
          >
            <tr>
              <td
                style="
                  padding: 24px 28px 6px 28px;
                  font-family: Arial, Helvetica, sans-serif;
                  text-align: center;
                "
              >
                <img
                  src="https://imagedelivery.net/8ZKTqmY-nvLYwhT7Pu0F0w/840ca96f-b999-48a3-2baa-aed5a9484900/public"
                  width="164"
                  alt="Ishi Kanban"
                  style="
                    display: block;
                    max-width: 164px;
                    width: 100%;
                    height: auto;
                    margin: 0 auto 12px auto;
                  "
                />
                <h1
                  style="
                    margin: 0;
                    font-size: 24px;
                    line-height: 1.25;
                    color: #00ff00;
                    font-weight: 700;
                  "
                >
                  Confirm your email
                </h1>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 10px 28px 0 28px;
                  font-family: Arial, Helvetica, sans-serif;
                  color: #00ff00;
                  text-align: center;
                "
              >
                <p
                  style="
                    margin: 0;
                    font-size: 15px;
                    line-height: 1.6;
                    color: #00ff00;
                  "
                >
                  Welcome to Ishi Kanban
                </p>
                <p
                  style="
                    margin: 0 0 14px 0;
                    font-size: 15px;
                    line-height: 1.6;
                    color: #00ff00;
                    text-align: center;
                  "
                >
                  Click below to verify your email
                </p>
                <p style="margin: 0 0 22px 0; text-align: center">
                  <a
                    href="https://example.com/signup/email/verify?token={{twilio_code}}"
                    target="_blank"
                    style="
                      display: inline-block;
                      padding: 12px 22px;
                      border-radius: 10px;
                      border: 1px solid #00ff00;
                      background: #000;
                      color: #00ff00;
                      font-weight: 700;
                      font-size: 14px;
                      text-decoration: none;
                    "
                  >
                    Verify Email
                  </a>
                </p>
                <p
                  style="
                    margin: 0 0 10px 0;
                    font-size: 13px;
                    line-height: 1.6;
                    color: #008100;
                    text-align: center;
                  "
                >
                  If that doesn't work,click the link below:
                </p>
                <p
                  style="
                    margin: 0 0 18px 0;
                    word-break: break-all;
                    font-size: 13px;
                    line-height: 1.6;
                  "
                >
                  <a
                    href="https://example.com/signup/email/verify?token={{twilio_code}}"
                    target="_blank"
                    style="color: #00ff00; text-decoration: underline"
                  >
                    https://ishikanban.com/signup/email/verify?token={{twilio_code}}
                  </a>
                </p>
                <p
                  style="
                    margin: 0 0 18px 0;
                    font-size: 13px;
                    line-height: 1.6;
                    color: #00ff00;
                  "
                >
                  {{twilio_message}}
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 16px 28px 24px 28px;
                  border-top: 1px solid #004200;
                  font-family: Arial, Helvetica, sans-serif;
                  color: #008100;
                  font-size: 12px;
                  line-height: 1.6;
                  text-align: center;
                "
              >
                If you didn't request this, you can safely ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
